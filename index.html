        :root {
            --bg-main: #0b0b0b;
            --bg-sidebar: #121212;
            --bg-card: #1a1a1a;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #facc15;
            --border: #27272a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
            gap: 15px;
        }

        .logo-area {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        /* Container ajustado para o LED Display no lugar do H1 */
        .logo-area h1 {
            margin: 0;
            height: 45px;
            display: block;

        .svg-filters {
            position: absolute;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;

        .nav-item:hover, .nav-item.active {
            background-color: rgba(250, 204, 21, 0.1);
            color: var(--accent);
            border: 1px solid rgba(250, 204, 21, 0.3);

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
            background: radial-gradient(circle at right bottom, #18181b 0%, #0b0b0b 70%);

            position: relative;
            z-index: 2;
            flex: 1;

    <!-- Script contendo o componente React LEDTicker adaptado para o ambiente HTML estático -->
    <script type="text/babel">
        const { useRef, useEffect, useMemo } = React;

        const ROWS = 7;
        const GLYPH_COLS = 5;
        const QUANTITY_MID = 10;
        const QUANTITY_MIN_ROWS = 3;
        const QUANTITY_MAX_ROWS = 21;

        function rowsForQuantity(quantity) {
            const q = Math.min(20, Math.max(1, Math.round(quantity)));
            const rows =
                q <= QUANTITY_MID
                    ? QUANTITY_MIN_ROWS +
                      ((q - 1) * (ROWS - QUANTITY_MIN_ROWS)) / (QUANTITY_MID - 1)
                    : ROWS +
                      ((q - QUANTITY_MID) * (QUANTITY_MAX_ROWS - ROWS)) / QUANTITY_MID;
            return Math.max(1, Math.round(rows));
        }

        const WORD_GAP_EXTRA = 3;
        const SEPARATOR_PAD_EXTRA = 5;

        const FONT = [
            [0x00, 0x00, 0x00, 0x00, 0x00],
            [0x00, 0x00, 0x5f, 0x00, 0x00],
            [0x00, 0x07, 0x00, 0x07, 0x00],
            [0x14, 0x7f, 0x14, 0x7f, 0x14],
            [0x24, 0x2a, 0x7f, 0x2a, 0x12],
            [0x23, 0x13, 0x08, 0x64, 0x62],
            [0x36, 0x49, 0x55, 0x22, 0x50],
            [0x00, 0x05, 0x03, 0x00, 0x00],
            [0x00, 0x1c, 0x22, 0x41, 0x00],
            [0x00, 0x41, 0x22, 0x1c, 0x00],
            [0x14, 0x08, 0x3e, 0x08, 0x14],
            [0x08, 0x08, 0x3e, 0x08, 0x08],
            [0x00, 0x50, 0x30, 0x00, 0x00],
            [0x08, 0x08, 0x08, 0x08, 0x08],
            [0x00, 0x60, 0x60, 0x00, 0x00],
            [0x20, 0x10, 0x08, 0x04, 0x02],
            [0x3e, 0x51, 0x49, 0x45, 0x3e],
            [0x00, 0x42, 0x7f, 0x40, 0x00],
            [0x42, 0x61, 0x51, 0x49, 0x46],
            [0x21, 0x41, 0x45, 0x4b, 0x31],
            [0x18, 0x14, 0x12, 0x7f, 0x10],
            [0x27, 0x45, 0x45, 0x45, 0x39],
            [0x3c, 0x4a, 0x49, 0x49, 0x30],
            [0x01, 0x71, 0x09, 0x05, 0x03],
            [0x36, 0x49, 0x49, 0x49, 0x36],
            [0x06, 0x49, 0x49, 0x29, 0x1e],
            [0x00, 0x36, 0x36, 0x00, 0x00],
            [0x00, 0x56, 0x36, 0x00, 0x00],
            [0x00, 0x08, 0x14, 0x22, 0x41],
            [0x14, 0x14, 0x14, 0x14, 0x14],
            [0x41, 0x22, 0x14, 0x08, 0x00],
            [0x02, 0x01, 0x51, 0x09, 0x06],
            [0x32, 0x49, 0x79, 0x41, 0x3e],
            [0x7e, 0x11, 0x11, 0x11, 0x7e],
            [0x7f, 0x49, 0x49, 0x49, 0x36],
            [0x3e, 0x41, 0x41, 0x41, 0x22],
            [0x7f, 0x41, 0x41, 0x22, 0x1c],
            [0x7f, 0x49, 0x49, 0x49, 0x41],
            [0x7f, 0x09, 0x09, 0x01, 0x01],
            [0x3e, 0x41, 0x41, 0x51, 0x32],
            [0x7f, 0x08, 0x08, 0x08, 0x7f],
            [0x00, 0x41, 0x7f, 0x41, 0x00],
            [0x20, 0x40, 0x41, 0x3f, 0x01],
            [0x7f, 0x08, 0x14, 0x22, 0x41],
            [0x7f, 0x40, 0x40, 0x40, 0x40],
            [0x7f, 0x02, 0x04, 0x02, 0x7f],
            [0x7f, 0x04, 0x08, 0x10, 0x7f],
            [0x3e, 0x41, 0x41, 0x41, 0x3e],
            [0x7f, 0x09, 0x09, 0x09, 0x06],
            [0x3e, 0x41, 0x51, 0x21, 0x5e],
            [0x7f, 0x09, 0x19, 0x29, 0x46],
            [0x46, 0x49, 0x49, 0x49, 0x31],
            [0x01, 0x01, 0x7f, 0x01, 0x01],
            [0x3f, 0x40, 0x40, 0x40, 0x3f],
            [0x1f, 0x20, 0x40, 0x20, 0x1f],
            [0x7f, 0x20, 0x18, 0x20, 0x7f],
            [0x63, 0x14, 0x08, 0x14, 0x63],
            [0x03, 0x04, 0x78, 0x04, 0x03],
            [0x61, 0x51, 0x49, 0x45, 0x43],
            [0x00, 0x00, 0x7f, 0x41, 0x41],
            [0x02, 0x04, 0x08, 0x10, 0x20],
            [0x41, 0x41, 0x7f, 0x00, 0x00],
            [0x04, 0x02, 0x01, 0x02, 0x04],
            [0x40, 0x40, 0x40, 0x40, 0x40],
        ];

        const EXTRA = {
            "●": [0x1c, 0x3e, 0x3e, 0x3e, 0x1c],
            "•": [0x00, 0x1c, 0x1c, 0x1c, 0x00],
            "·": [0x00, 0x00, 0x18, 0x00, 0x00],
            "°": [0x00, 0x03, 0x03, 0x00, 0x00],
            "★": [0x24, 0x2a, 0x7f, 0x2a, 0x24],
            "→": [0x08, 0x08, 0x2a, 0x1c, 0x08],
            "←": [0x08, 0x1c, 0x2a, 0x08, 0x08],
        };
        const FOLD = { "–": "-", "—": "-" };

        function glyphFor(char) {
            const extra = EXTRA[char];
            if (extra) return extra;
            const folded = FOLD[char] ?? char;
            const code = folded.toUpperCase().charCodeAt(0);
            const glyph = FONT[code - 32];
            return glyph ?? FONT[0];
        }

        function flickerNoise(t) {
            const i = Math.floor(t);
            const f = t - i;
            const hash = (n) => {
                const s = Math.sin(n * 127.1 + 311.7) * 43758.5453;
                return s - Math.floor(s);
            };
            const smooth = f * f * (3 - 2 * f);
            const value = hash(i) * (1 - smooth) + hash(i + 1) * smooth;
            return value * value;
        }

        function buildColumns(items, separator, spread) {
            const parts = (items ?? []).map((item) => item.trim()).filter(Boolean);
            const joiner = (separator ?? "").trim();
            const columns = [];
            const blanks = (count) => {
                for (let i = 0; i < count; i++) columns.push(0);
            };

            const writeText = (text) => {
                const chars = [...text];
                chars.forEach((char, index) => {
                    if (char === " ") {
                        blanks(spread + WORD_GAP_EXTRA);
                        return;
                    }
                    const glyph = glyphFor(char);
                    for (let i = 0; i < GLYPH_COLS; i++) columns.push(glyph[i]);
                    const next = chars[index + 1];
                    if (next !== undefined && next !== " ") blanks(spread);
                });
            };

            if (parts.length === 0) {
                blanks(GLYPH_COLS + spread);
                return columns;
            }

            for (const part of parts) {
                writeText(part);
                blanks(spread + SEPARATOR_PAD_EXTRA);
                if (joiner) {
                    writeText(joiner);
                    blanks(spread + SEPARATOR_PAD_EXTRA);
                }
            }
            return columns;
        }

        function LEDTicker({
            items = ["PIXBET"],
            separator = "●",
            speed = 15,
            direction = "left",
            textSize = 60,
            dotSize = 14,
            dotQuantity = 10,
            spread = 1,
            dotShape = "round",
            onColor = "#facc15",
            offColor = "rgba(250, 204, 21, 0.05)",
            glow = true,
            glowOptions = { strength: 60, size: 8 },
            flicker = false,
            flickerOptions = { strength: 40, speed: 50 },
            style,
        }) {
            const canvasRef = useRef(null);

            const glowStrength = glow ? (glowOptions?.strength ?? 0) / 100 : 0;
            const glowSize = glow ? (glowOptions?.size ?? 0) / 10 : 0;
            const flickerStrength = flicker ? (flickerOptions?.strength ?? 0) / 100 : 0;
            const flickerSpeed = flicker ? (flickerOptions?.speed ?? 0) / 10 : 0;

            const itemsKey = JSON.stringify(items ?? []);
            const columns = useMemo(
                () => buildColumns(JSON.parse(itemsKey), separator, spread),
                [itemsKey, separator, spread]
            );

            useEffect(() => {
                const el = canvasRef.current;
                if (!el) return;
                const context = el.getContext("2d");
                if (!context) return;
                const canvas = el;
                const ctx = context;

                const total = columns.length;
                let alive = true;
                let raf = 0;
                let last = 0;
                let offset = 0;

                let dpr = 1;
                let cell = 1;
                let radius = 1;
                let visibleCols = 0;
                let boardRows = ROWS;
                let yPad = 0;
                let scale = 1;
                let rowSource = [];

                function measure() {
                    dpr = Math.min(window.devicePixelRatio || 1, 2);
                    const w = canvas.clientWidth || 260;
                    const h = canvas.clientHeight || 45;
                    canvas.width = Math.max(1, Math.round(w * dpr));
                    canvas.height = Math.max(1, Math.round(h * dpr));
                    boardRows = rowsForQuantity(dotQuantity);
                    scale = boardRows / ROWS;
                    cell = Math.max(1, (textSize / boardRows) * dpr);
                    radius = (dotSize * dpr) / 2;
                    visibleCols = Math.ceil(canvas.width / cell) + 1;
                    yPad = (canvas.height - boardRows * cell) / 2;
                    rowSource = [];
                    for (let row = 0; row < boardRows; row++) {
                        rowSource.push(Math.min(ROWS - 1, Math.floor(row / scale)));
                    }
                }

                function dotPath(x, y) {
                    if (dotShape === "square") {
                        const s = radius * 2;
                        ctx.rect(x - radius, y - radius, s, s);
                    } else {
                        ctx.moveTo(x + radius, y);
                        ctx.arc(x, y, radius, 0, Math.PI * 2);
                    }
                }

                function draw(time) {
                    const w = canvas.width;
                    const h = canvas.height;
                    ctx.clearRect(0, 0, w, h);

                    const boardOffset = offset * scale;
                    const whole = Math.floor(boardOffset);
                    const shift = (boardOffset - whole) * cell;
                    const sign = direction === "right" ? -1 : 1;
                    const xBase = -sign * shift;

                    ctx.beginPath();
                    for (let cx = 0; cx < visibleCols; cx++) {
                        const px = xBase + cx * cell + cell / 2;
                        for (let row = 0; row < boardRows; row++) {
                            dotPath(px, yPad + row * cell + cell / 2);
                        }
                    }
                    ctx.fillStyle = offColor;
                    ctx.fill();

                    ctx.beginPath();
                    for (let cx = 0; cx < visibleCols; cx++) {
                        const source = Math.floor((cx + sign * whole) / scale);
                        const index = ((source % total) + total) % total;
                        const bits = columns[index];
                        if (!bits) continue;
                        const px = xBase + cx * cell + cell / 2;
                        for (let row = 0; row < boardRows; row++) {
                            if (!((bits >> rowSource[row]) & 1)) continue;
                            dotPath(px, yPad + row * cell + cell / 2);
                        }
                    }

                    const wobble =
                        flickerStrength > 0
                            ? 1 - flickerStrength * flickerNoise((time / 1000) * flickerSpeed)
                            : 1;
                    ctx.globalAlpha = wobble;
                    ctx.fillStyle = onColor;

                    if (glowStrength > 0) {
                        ctx.save();
                        ctx.globalCompositeOperation = "lighter";
                        ctx.shadowColor = onColor;
                        ctx.shadowBlur = radius * 2 * glowSize;
                        ctx.globalAlpha = wobble * glowStrength;
                        ctx.fill();
                        ctx.restore();
                        ctx.globalAlpha = wobble;
                        ctx.fillStyle = onColor;
                    }
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }

                function frame(time) {
                    if (!alive) return;
                    const dt = last ? Math.min((time - last) / 1000, 0.05) : 0;
                    last = time;
                    offset = (offset + speed * dt) % total;
                    draw(time);
                    raf = requestAnimationFrame(frame);
                }

                measure();
                draw(0);

                let ro = null;
                if (typeof ResizeObserver !== "undefined") {
                    ro = new ResizeObserver(() => {
                        measure();
                        draw(last);
                    });
                    ro.observe(canvas);
                }
                raf = requestAnimationFrame(frame);

                return () => {
                    alive = false;
                    cancelAnimationFrame(raf);
                    ro?.disconnect();
                };
            }, [
                columns,
                speed,
                direction,
                textSize,
                dotSize,
                dotQuantity,
                dotShape,
                onColor,
                offColor,
                glowStrength,
                glowSize,
                flickerStrength,
                flickerSpeed,
            ]);

            return (
                <canvas
                    ref={canvasRef}
                    style={{
                        ...style,
                        display: "block",
                        width: "100%",
                        height: "100%",
                    }}
                />
            );
        }

        // Renderiza o LED Ticker no elemento dedicado da barra lateral
        const root = ReactDOM.createRoot(document.getElementById('led-ticker-root'));
        root.render(<LEDTicker items={["PIXBET"]} />);
    </script>

        function show(key, btnElement) {
            const area = document.getElementById('display-area');
            const header = document.getElementById('content-header');
            const d = db[key];
            if (!d) return;

            header.innerHTML = `<h2>${d.title}</h2><p>${d.desc}</p>`;

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            let html = '';
            if (d.type === "custom") {
                html += d.html;
            } else {
                html += `<div class="grid-container">${d.html}</div>`;
            }
            area.innerHTML = html;
        }

        window.onload = function() {
            show('pontos', document.querySelector('.nav-item'));
        };
